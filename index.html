<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>International Women's Day 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --rose: #E8637A;
    --deep: #1a0a12;
    --cream: #FDF5E8;
    --blush: #F2C4CE;
    --burgundy: #6B1D3A;
    --accent: #FF8FA3;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--deep);
    font-family: 'Montserrat', sans-serif;
    color: var(--cream);
  }

  /* ── PARTICLE CANVAS ── */
  #canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCENES ── */
  .scene {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.8s ease;
  }
  .scene.active { opacity: 1; pointer-events: all; }

  /* ── SCENE 1: OPENER ── */
  #s1 {
    background: radial-gradient(ellipse at 50% 60%, #3d0a22 0%, #1a0a12 70%);
    text-align: center;
    gap: 16px;
  }
  .date-badge {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: clamp(10px, 1.4vw, 14px);
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s 0.3s forwards;
  }
  .big-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 8vw, 110px);
    font-weight: 900;
    font-style: italic;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--gold) 45%, var(--rose) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation: fadeUp 1s 0.7s forwards;
  }
  .sub-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 2.5vw, 32px);
    font-style: italic;
    font-weight: 300;
    color: var(--blush);
    letter-spacing: 0.15em;
    opacity: 0;
    animation: fadeUp 1s 1.1s forwards;
  }
  .divider {
    width: 120px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    opacity: 0;
    animation: fadeIn 1s 1.5s forwards;
  }
  .tagline {
    font-size: clamp(10px, 1.2vw, 12px);
    letter-spacing: 0.4em;
    font-weight: 300;
    color: rgba(253,245,232,0.5);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s 1.8s forwards;
  }

  /* ── SCENE 2: WOMEN GRID ── */
  #s2 {
    background: linear-gradient(160deg, #0d0208 0%, #1f0619 50%, #0d0208 100%);
    flex-direction: column;
    gap: 24px;
    padding: 40px 20px;
  }
  .section-label {
    font-size: clamp(9px, 1.1vw, 11px);
    letter-spacing: 0.5em;
    font-weight: 600;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.8s 0.2s;
  }
  #s2.active .section-label { opacity: 1; }

  .section-heading {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 4vw, 52px);
    font-weight: 700;
    text-align: center;
    color: var(--cream);
    opacity: 0;
    transition: opacity 0.8s 0.4s, transform 0.8s 0.4s;
    transform: translateY(20px);
  }
  #s2.active .section-heading { opacity: 1; transform: translateY(0); }

  .women-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px 16px;
    max-width: 960px;
    width: 100%;
  }

  .woman-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s, transform 0.6s;
    cursor: default;
  }
  #s2.active .woman-card { opacity: 1; transform: translateY(0); }
  #s2.active .woman-card:nth-child(1)  { transition-delay: 0.5s; }
  #s2.active .woman-card:nth-child(2)  { transition-delay: 0.62s; }
  #s2.active .woman-card:nth-child(3)  { transition-delay: 0.74s; }
  #s2.active .woman-card:nth-child(4)  { transition-delay: 0.86s; }
  #s2.active .woman-card:nth-child(5)  { transition-delay: 0.98s; }
  #s2.active .woman-card:nth-child(6)  { transition-delay: 1.1s; }
  #s2.active .woman-card:nth-child(7)  { transition-delay: 1.22s; }
  #s2.active .woman-card:nth-child(8)  { transition-delay: 1.34s; }
  #s2.active .woman-card:nth-child(9)  { transition-delay: 1.46s; }
  #s2.active .woman-card:nth-child(10) { transition-delay: 1.58s; }
  #s2.active .woman-card:nth-child(11) { transition-delay: 1.70s; }
  #s2.active .woman-card:nth-child(12) { transition-delay: 1.82s; }

  .avatar-ring {
    width: clamp(60px, 8vw, 100px);
    height: clamp(60px, 8vw, 100px);
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--gold), var(--rose), var(--burgundy));
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .woman-card:hover .avatar-ring {
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(201,168,76,0.5);
  }
  .avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: var(--deep);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(22px, 3.2vw, 40px);
    overflow: hidden;
  }
  .woman-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(10px, 1.2vw, 13px);
    font-weight: 700;
    text-align: center;
    color: var(--cream);
  }
  .woman-title {
    font-size: clamp(8px, 0.9vw, 10px);
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-align: center;
    line-height: 1.3;
  }

  /* ── SCENE 3: QUOTES ── */
  #s3 {
    background: radial-gradient(ellipse at 30% 40%, #2d0a1a 0%, #0d0208 70%);
    flex-direction: column;
    gap: 20px;
    padding: 40px;
    text-align: center;
  }
  .quote-wrapper {
    max-width: 700px;
    position: relative;
  }
  .quote-mark {
    font-family: 'Playfair Display', serif;
    font-size: 120px;
    line-height: 0.5;
    color: var(--rose);
    opacity: 0.3;
    position: absolute;
    top: 0; left: -20px;
  }
  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(20px, 3.5vw, 46px);
    font-style: italic;
    font-weight: 300;
    line-height: 1.4;
    color: var(--cream);
    padding: 20px 20px 0;
    opacity: 0;
    transition: opacity 0.8s, transform 0.8s;
    transform: translateY(20px);
  }
  #s3.active .quote-text { opacity: 1; transform: translateY(0); }
  .quote-author {
    font-size: clamp(10px, 1.2vw, 12px);
    letter-spacing: 0.35em;
    font-weight: 400;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 16px;
    opacity: 0;
    transition: opacity 0.8s 0.6s;
  }
  #s3.active .quote-author { opacity: 1; }

  .quote-dots {
    display: flex; gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }
  .qdot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(201,168,76,0.3);
    cursor: pointer;
    transition: background 0.3s, transform 0.3s;
  }
  .qdot.active { background: var(--gold); transform: scale(1.4); }

  /* ── SCENE 4: CLOSER ── */
  #s4 {
    background: radial-gradient(ellipse at 50% 40%, #3a0a20 0%, #0d0208 65%);
    text-align: center;
    gap: 20px;
    padding: 40px;
  }
  .close-emoji {
    font-size: clamp(40px, 8vw, 80px);
    opacity: 0;
    transition: opacity 0.8s 0.2s, transform 1s 0.2s;
    transform: scale(0.5) rotate(-10deg);
  }
  #s4.active .close-emoji { opacity: 1; transform: scale(1) rotate(0deg); }
  .close-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5.5vw, 72px);
    font-weight: 900;
    font-style: italic;
    background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, var(--rose) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    transition: opacity 0.8s 0.5s, transform 0.8s 0.5s;
    transform: translateY(20px);
    line-height: 1.1;
  }
  #s4.active .close-title { opacity: 1; transform: translateY(0); }
  .close-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(14px, 2vw, 24px);
    font-style: italic;
    color: var(--blush);
    opacity: 0;
    transition: opacity 0.8s 0.9s;
  }
  #s4.active .close-sub { opacity: 1; }
  .close-hashtag {
    font-size: clamp(11px, 1.4vw, 14px);
    letter-spacing: 0.3em;
    font-weight: 600;
    color: var(--gold);
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.8s 1.2s;
  }
  #s4.active .close-hashtag { opacity: 1; }
  .restart-btn {
    margin-top: 24px;
    padding: 12px 36px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 40px;
    transition: background 0.3s, color 0.3s, transform 0.2s;
    opacity: 0;
    transition: opacity 0.8s 1.5s, background 0.3s, color 0.3s;
  }
  #s4.active .restart-btn { opacity: 1; }
  .restart-btn:hover { background: var(--gold); color: var(--deep); transform: scale(1.05); }

  /* ── NAV DOTS ── */
  #nav {
    position: fixed;
    right: 24px; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 10px;
    z-index: 100;
  }
  .ndot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(201,168,76,0.25);
    cursor: pointer;
    transition: background 0.3s, transform 0.3s;
    border: 1px solid rgba(201,168,76,0.4);
  }
  .ndot.active { background: var(--gold); transform: scale(1.5); }

  /* ── PROGRESS BAR ── */
  #progress {
    position: fixed; bottom: 0; left: 0;
    height: 3px;
    background: linear-gradient(to right, var(--rose), var(--gold));
    z-index: 100;
    transition: width 0.3s linear;
  }

  /* ── KEYFRAMES ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33%       { transform: translateY(-15px) rotate(5deg); }
    66%       { transform: translateY(5px) rotate(-3deg); }
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
    70%  { box-shadow: 0 0 0 15px rgba(201,168,76,0); }
    100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
  }

  /* Floating petals */
  .petal {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    animation: fall linear infinite;
    z-index: 1;
    opacity: 0.6;
  }
  @keyframes fall {
    0%   { transform: translateY(-60px) rotate(0deg); opacity: 0.7; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="progress"></div>

<div id="nav">
  <div class="ndot active" onclick="goTo(0)"></div>
  <div class="ndot" onclick="goTo(1)"></div>
  <div class="ndot" onclick="goTo(2)"></div>
  <div class="ndot" onclick="goTo(3)"></div>
</div>

<!-- SCENE 1: OPENER -->
<div class="scene active" id="s1">
  <p class="date-badge">March 8, 2026</p>
  <h1 class="big-title">Women's<br>Day</h1>
  <div class="divider"></div>
  <p class="sub-title">International</p>
  <p class="tagline">Celebrating the Women Who Shape Our World</p>
</div>

<!-- SCENE 2: LEADING LADIES -->
<div class="scene" id="s2">
  <p class="section-label">Leading Ladies</p>
  <h2 class="section-heading">Icons Who Inspire</h2>
  <div class="women-grid" id="womenGrid"></div>
</div>

<!-- SCENE 3: QUOTES -->
<div class="scene" id="s3">
  <p class="section-label">Words of Power</p>
  <div class="quote-wrapper">
    <div class="quote-mark">"</div>
    <p class="quote-text" id="quoteText"></p>
  </div>
  <p class="quote-author" id="quoteAuthor"></p>
  <div class="quote-dots" id="quoteDots"></div>
</div>

<!-- SCENE 4: CLOSER -->
<div class="scene" id="s4">
  <div class="close-emoji">🌹</div>
  <h2 class="close-title">Here's to<br>Every Woman</h2>
  <p class="close-sub">Who dared to dream, lead, and inspire.</p>
  <p class="close-hashtag">#IWD2026 &nbsp;·&nbsp; #InspireInclusion</p>
  <button class="restart-btn" onclick="restart()">Watch Again</button>
</div>

<script>
/* ── DATA ── */
const women = [
  { emoji: '🔬', name: 'Kiran Mazumdar-Shaw', title: 'Biotech Pioneer · Founder, Biocon · India' },
  { emoji: '🏸', name: 'P.V. Sindhu', title: 'Olympic Medallist · Badminton Champion · India' },
  { emoji: '⚖️', name: 'Indira Jaising', title: 'Trailblazing Human Rights Lawyer · India' },
  { emoji: '🌺', name: 'Aung San Suu Kyi', title: 'Nobel Peace Prize · Democracy Icon · Myanmar' },
  { emoji: '🚀', name: 'Tessy Thomas', title: '"Missile Woman of India" · DRDO Chief' },
  { emoji: '🎬', name: 'Zhang Ziyi', title: 'Global Film Icon · Cultural Ambassador · China' },
  { emoji: '💡', name: 'Falguni Nayar', title: 'Founder, Nykaa · India\'s Self-Made Billionaire' },
  { emoji: '🌏', name: 'Jacinda Ardern', title: 'Former PM of New Zealand · Compassionate Leader' },
  { emoji: '🧬', name: 'Jennifer Doudna', title: 'Nobel Laureate · CRISPR Pioneer · USA' },
  { emoji: '🎵', name: 'A.R. Rahman\'s Muse', title: 'M.S. Subbulakshmi · Carnatic Legend · India' },
  { emoji: '✊', name: 'Irom Sharmila', title: '"Iron Lady of Manipur" · Peace Activist · India' },
  { emoji: '🏆', name: 'Mary Kom', title: '6× World Boxing Champion · Olympic Medallist · India' },
];

const quotes = [
  { text: "Do not wait for someone else to come and speak for you. It's you who can change the world.", author: "Kiran Mazumdar-Shaw" },
  { text: "I am not a saint, unless you think of a saint as a sinner who keeps on trying.", author: "Aung San Suu Kyi" },
  { text: "Boxing is a sport of passion, dedication and hard work — and women can do it all.", author: "Mary Kom" },
  { text: "Science knows no country, because knowledge belongs to humanity and is the torch which illuminates the world.", author: "Tessy Thomas" },
];

/* ── STATE ── */
let currentScene = 0;
let quoteIndex = 0;
let autoTimer = null;
let quoteTimer = null;
const scenes = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
const ndots = document.querySelectorAll('.ndot');
const progressBar = document.getElementById('progress');

/* ── BUILD GRID ── */
const grid = document.getElementById('womenGrid');
women.forEach(w => {
  const card = document.createElement('div');
  card.className = 'woman-card';
  card.innerHTML = `
    <div class="avatar-ring">
      <div class="avatar-inner">${w.emoji}</div>
    </div>
    <div class="woman-name">${w.name}</div>
    <div class="woman-title">${w.title}</div>
  `;
  grid.appendChild(card);
});

/* ── QUOTES ── */
function renderQuote(i) {
  const q = quotes[i];
  const qt = document.getElementById('quoteText');
  const qa = document.getElementById('quoteAuthor');
  qt.style.opacity = 0; qt.style.transform = 'translateY(20px)';
  qa.style.opacity = 0;
  setTimeout(() => {
    qt.textContent = q.text;
    qa.textContent = '— ' + q.author;
    qt.style.transition = 'opacity 0.6s, transform 0.6s';
    qa.style.transition = 'opacity 0.6s 0.4s';
    qt.style.opacity = 1; qt.style.transform = 'translateY(0)';
    qa.style.opacity = 1;
  }, 300);
  document.querySelectorAll('.qdot').forEach((d,j) => d.classList.toggle('active', j===i));
}

const dotsContainer = document.getElementById('quoteDots');
quotes.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'qdot' + (i===0?' active':'');
  d.onclick = () => { quoteIndex = i; renderQuote(i); };
  dotsContainer.appendChild(d);
});
renderQuote(0);

/* ── NAVIGATION ── */
function goTo(i) {
  if (i < 0 || i >= scenes.length) return;
  scenes[currentScene].classList.remove('active');
  ndots[currentScene].classList.remove('active');
  currentScene = i;
  scenes[currentScene].classList.add('active');
  ndots[currentScene].classList.add('active');
  updateProgress();
  resetAutoTimer();
  if (i === 2) startQuoteRotation();
  else stopQuoteRotation();
}

function updateProgress() {
  const pct = ((currentScene + 1) / scenes.length) * 100;
  progressBar.style.width = pct + '%';
}

function resetAutoTimer() {
  clearTimeout(autoTimer);
  const durations = [5000, 7000, 10000, 0];
  if (currentScene < scenes.length - 1) {
    autoTimer = setTimeout(() => goTo(currentScene + 1), durations[currentScene]);
  }
}

function startQuoteRotation() {
  stopQuoteRotation();
  quoteTimer = setInterval(() => {
    quoteIndex = (quoteIndex + 1) % quotes.length;
    renderQuote(quoteIndex);
  }, 3500);
}
function stopQuoteRotation() { clearInterval(quoteTimer); }

function restart() {
  stopQuoteRotation();
  clearTimeout(autoTimer);
  quoteIndex = 0;
  renderQuote(0);
  goTo(0);
}

/* ── PARTICLES CANVAS ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createParticle() {
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 0.5,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    alpha: Math.random() * 0.6 + 0.1,
    color: Math.random() > 0.5 ? '#C9A84C' : '#E8637A',
  };
}

for (let i = 0; i < 120; i++) particles.push(createParticle());

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

/* ── FLOATING PETALS ── */
const petalEmojis = ['🌸','🌺','✨','🌷','💫'];
function spawnPetal() {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (14 + Math.random() * 16) + 'px';
  const dur = 6 + Math.random() * 8;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay = (Math.random() * 4) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 4) * 1000);
}
setInterval(spawnPetal, 1200);

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentScene + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(currentScene - 1);
});

/* ── TOUCH SWIPE ── */
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(dx) > 50) goTo(currentScene + (dx > 0 ? 1 : -1));
});

/* ── INIT ── */
updateProgress();
resetAutoTimer();
</script>
</body>
</html>
